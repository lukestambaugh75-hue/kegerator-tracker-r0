name: Refresh Kegerator dashboard

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest
      - name: Refresh data
        run: python scripts/refresh.py
      - name: Verify
        run: |
          python -m json.tool data/listings.json >/dev/null
          python -m json.tool data/specs.json >/dev/null
          python -m pytest -q
      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/listings.json data/specs.json history.csv
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Refresh Kegerator dashboard data"
            git push
          fi
